flow:
  name: 診療
  facility: 国立成育研究医療センター
  author: トシTuan
  createdAt: 2026-07-08 10:06
  updatedAt: 2026-07-10 00:51
  start: welcome
  nodes:
    - id: welcome
      type: announce
      text: お電話ありがとうございます。虎ノ門ヒルズ総合病院、予約受付専用のAI電話です。
      next: interaction_1
    - id: interaction_1
      type: interaction
      description: ""
      repeat: yes
      inputType: STT_DTMF
      voiceType: TEXT
      retryCount: "2"
      announce: はじめに、ご用件を次の4つのうち、いずれかでお話しください。 1番. 新規予約、2番. 予約変更、3番. 予約キャンセル、4番. その他お問い合わせ。プッシュボタンでも操作可能です。
      repeatAnnounce: ご用件は、<%classification%>でよろしいでしょうか。
      retryAnnounce: 申し訳ございません。ご回答いただいた内容が確認できませんでした。もう一度、ご用件をお話しください。プッシュボタンでも操作可能です。
      next: logic_1
    - id: announce_1
      type: announce
      description: ""
      text: 大変申し訳ございません。ご回答板田多内容が確認できませんでした。お手数ですが、代表電話番号までおかけ直しください。お電話ありがとうございました。それでは失礼いたします。
      next: flag_1
    - id: flag_1
      type: flag
      description: ""
      next: hangup_1
    - id: hangup_1
      type: hangup
      description: ""
    - id: logic_1
      type: logic
      description: ""
      moduleType: Script
      branches:
        - default: interaction_1
          label: retry
        - when: 予約|変更|キャンセル|その他問い合わせ
          to: nexus_1
          label: success
    - id: nexus_1
      type: nexus
      description: ""
      saveContext: yes
      contextName: classification
      contextType: CLASSIFICATION
      branches:
        - default: jump_1
          label: reserve
        - when: 変更
          to: jump_2
          label: change
        - when: キャンセル
          to: jump_3
          label: cancel
        - when: その他お問い合わせ
          to: jump_4
          label: inquiry
    - id: jump_1
      type: jump
      description: ""
    - id: jump_2
      type: jump
      description: ""
    - id: jump_3
      type: jump
      description: ""
    - id: jump_4
      type: jump
      description: ""
  subflows:
    - name: 個人情報
      nodes: []
