    - id: logic_1
      type: logic
      name: Script_用件
      position:
        x: 1200
        y: 544
      description: ""
      moduleType: Script
      script: |-
        var logger = $runner.getLogger();

        // 入力取得（string / {text} 両対応）
        var r = $runner.getModuleResult("interaction_1");
        var text = (r && typeof r === "object" && r.text) ? String(r.text) : (r == null ? "" : String(r));
        text = text.trim();
        logger.info("raw input: " + text);

        // 正規化（全角数字→半角、英字→半角、カナ→ひらがな、記号・空白削除）
        function normalize(s) {
          if (!s) return "";
          var n = s.replace(/[０-９]/g, function(c) {
            return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
          });
          n = n.replace(/[Ａ-Ｚａ-ｚ]/g, function(c) {
            return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
          });
          n = n.replace(/[ァ-ヶ]/g, function(c) {
            return String.fromCharCode(c.charCodeAt(0) - 0x60);
          });
          n = n.replace(/[\s\t\r\n　、。・「」『』（）()［］\[\]！？!？‐\-―]/g, "");
          return n;
        }

        // REPEAT 判定用
        function isRepeat(n) {
          if (!n) return false;
          if (/(もういちど|もう一度|もういっかい|もう一回|くりかえし|繰り返し)/.test(n)) return true;
          if (/^(くりかえして|もういちどきかせて|もういちどおねがい|もういっかいおねがい)$/.test(n)) return true;
          return false;
        }

        // DTMF 単独入力を優先判定
        function classifyByDtmf(raw) {
          if (!raw) return null;
          var t = raw.replace(/\s/g, "");
          if (!/^[0-9]$/.test(t)) return null;
          if (t === "1") return "予約";
          if (t === "2") return "変更";
          if (t === "3") return "キャンセル";
          if (t === "4") return "その他問い合わせ";
          return null;
        }

        function classify(rawText) {
          if (!rawText) return "NO_RESULT";

          // DTMF 単独数字判定
          var byDtmf = classifyByDtmf(rawText);
          if (byDtmf) return byDtmf;

          var n = normalize(rawText);
          logger.info("normalized input: " + n);
          if (n.length === 0) return "NO_RESULT";

          // REPEAT
          if (isRepeat(n)) return "REPEAT";

          // キャンセル（3番）を最優先
          if (/^3$/.test(n) || /3(ばん|番)/.test(n)) return "キャンセル";
          if (/きゃんせる|キャンセル|取消|とりけし|やめたい|やめます/.test(n)) return "キャンセル";

          // 変更（2番）
          if (/^2$/.test(n) || /2(ばん|番)/.test(n)) return "変更";
          if (/変更|へんこう|かえたい|かえます|日時をかえ|日にちをかえ|時間をかえ|じかんをかえ/.test(n)) return "変更";

          // 新規予約（1番） → 出力は「予約」
          if (/^1$/.test(n) || /1(ばん|番)/.test(n)) return "予約";
          if (/新規予約|しんきよやく|しんきでよやく|あたらしくよやく|はじめてのよやく/.test(n)) return "予約";
          if (/予約|よやく/.test(n)) return "予約";

          // その他お問い合わせ（4番） → 出力は「その他問い合わせ」
          if (/^4$/.test(n) || /4(ばん|番)/.test(n)) return "その他問い合わせ";
          if (/その他|そのた|ほかのおといあわせ|ほかのお問い合わせ|問い合わせ|といあわせ|質問|しつもん|相談|そうだん/.test(n)) {
            return "その他問い合わせ";
          }

          // どれにもはっきり該当しない → とりあえず「その他問い合わせ」に寄せるか、NO_RESULT にするか
          // 今回ははっきりしない場合は NO_RESULT を返し、上位ノードでリトライさせる前提
          return "NO_RESULT";
        }

        var result = classify(text);

        // classification をコンテキストに保存（REPEAT/NO_RESULT は保存しない）
        if (result !== "NO_RESULT" && result !== "REPEAT") {
          try {
            $ivr.exec("save2db", "save", JSON.stringify({
              contextField: {
                contextName: "classification",
                displayType: "CLASSIFICATION",
                value: result
              }
            }));
            $runner.setObject("classification", result);
          } catch (e) {
            logger.error(e);
          }
        }

        logger.info("classification result: " + result);
        $runner.setResult(result);
      scriptExplanation: |-
        - Script lấy kết quả nhập (giọng nói hoặc DTMF), chuẩn hóa, phân loại ý định khách (予約/変更/キャンセル/その他問い合わせ/REPEAT/NO_RESULT), log lại và lưu kết quả phân loại (trừ REPEAT, NO_RESULT) vào context/DB.  
        - "予約": khách muốn đặt mới (hoặc chọn phím 1).  
        - "変更": khách muốn thay đổi nội dung/Ngày giờ đặt (hoặc chọn phím 2).  
        - "キャンセル": khách muốn hủy đặt chỗ (hoặc chọn phím 3).  
        - "その他問い合わせ": khách có các hỏi đáp/trao đổi khác (hoặc chọn phím 4).  
        - "REPEAT": khách yêu cầu lặp lại/nhắc lại nội dung.  
        - "NO_RESULT": không hiểu/không phân loại được, để node trên xử lý retry.
      branches:
        - default: interaction_1
          label: retry
        - when: 予約|変更|キャンセル|その他問い合わせ
          to: nexus_1
          label: success
    - id: nexus_1
