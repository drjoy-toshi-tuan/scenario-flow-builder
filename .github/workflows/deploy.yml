name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ 1 deploy tại 1 thời điểm. KHÔNG huỷ deploy đang chạy — để production deploy
# hoàn tất; các run mới xếp hàng chạy lần lượt. Tránh lỗi
# "Canceling since a higher priority waiting request for pages exists".
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Kiểm tra secret có tới được job build không — CHỈ in có/rỗng + độ dài, KHÔNG
      # lộ giá trị. Nếu in EMPTY nghĩa là secret đặt sai chỗ (vd Environment secret của
      # môi trường github-pages, job build không đọc được) hoặc sai tên.
      - name: Kiểm tra biến build (không lộ giá trị)
        env:
          VITE_AI_PROXY_URL: ${{ secrets.VITE_AI_PROXY_URL || vars.VITE_AI_PROXY_URL }}
        run: |
          if [ -z "$VITE_AI_PROXY_URL" ]; then
            echo "::warning::VITE_AI_PROXY_URL EMPTY ở job build — tính năng AI sẽ tắt. Đặt ở Repository secret/variable (KHÔNG phải Environment secret) và đúng tên."
          else
            echo "VITE_AI_PROXY_URL OK (length=${#VITE_AI_PROXY_URL})"
          fi

      - run: npm run build
        env:
          # Client ID (không phải secret) — set ở Settings > Secrets and variables > Actions.
          # Chấp nhận cả tab "Secrets" LẪN tab "Variables" để tránh cấu hình nhầm chỗ.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || vars.VITE_GOOGLE_CLIENT_ID }}
          # URL proxy AI (Cloudflare Worker) cho tính năng "AIで生成・修正". KHÔNG phải
          # secret (chỉ là URL) — chấp nhận cả tab "Secrets" LẪN "Variables".
          VITE_AI_PROXY_URL: ${{ secrets.VITE_AI_PROXY_URL || vars.VITE_AI_PROXY_URL }}
          # Model tuỳ chọn — bỏ trống thì dùng mặc định gpt-5.1 (xem src/ai/config.ts).
          VITE_OPENAI_MODEL: ${{ secrets.VITE_OPENAI_MODEL || vars.VITE_OPENAI_MODEL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url }}
    steps:
      # GitHub Pages đôi khi trả "Deployment failed, try again later." (lỗi tạm thời
      # phía backend, không phải lỗi build). Tự thử lại tối đa 2 lần để không phải
      # re-run thủ công mỗi lần merge.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Chờ trước khi thử lại
        if: steps.deploy1.outcome == 'failure'
        run: sleep 25

      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
