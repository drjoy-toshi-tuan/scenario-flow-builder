<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon SVG (Vite tự thêm tiền tố `base` khi build cho GitHub Pages).
         `?v=` là cache-buster: trình duyệt cache favicon rất "lì", tách khỏi cache
         trang và không đổi kể cả hard-refresh. Tăng số này mỗi lần đổi favicon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="theme-color" content="#ff7a1a" />
    <title>Brekeke Flow Builder</title>
    <!-- Phông chữ: Noto Sans (Latin + tiếng Việt, dấu câu chuẩn) & Noto Sans JP (tiếng Nhật) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
